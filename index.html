<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
	<title>Pokémon Catch Rate Rechner</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
	<link rel="stylesheet" href="pokemon.css">

  <style>
  </style>
</head>

<body>
	
<video autoplay muted loop playsinline id="bg-video">
<source src="Video/short.mp4" type="video/mp4">
</video>
	
	<div class="container">

  <h1>Pokémon Catch Rate Rechner</h1>

  <label>Pokémon Name:</label>
  <input
    id="pokemonName"
    type="text"
    placeholder="Probopass"
  >

  <br><br>

  <label>KP-Leiste:</label>
  <select id="hpPercent">
    <option value="1">Voll / 100%</option>
    <option value="0.75">Ca. 75%</option>
    <option value="0.5">Ca. 50%</option>
    <option value="0.3">Gelb / ca. 30%</option>
    <option value="0.15">Rot / ca. 15%</option>
    <option value="0.01">1 KP / fast besiegt</option>
  </select>

  <br><br>

  <label>Ball:</label>
  <select id="ballBonus">
    <option value="1">Pokéball</option>
    <option value="1.5">Superball</option>
    <option value="2">Hyperball</option>
    <option value="255">Meisterball</option>
  </select>

  <br><br>

  <label>Status:</label>
  <select id="statusBonus">
    <option value="1">Kein Status</option>
    <option value="1.5">
      Paralyse / Gift / Brand
    </option>
    <option value="2.5">
      Schlaf / Eis
    </option>
  </select>

  <br><br>

  <button onclick="calculateCatchChance()">
    Berechnen
  </button>

  <h2 id="result">
    Fangchance: -
  </h2>

  <script>

    function getSelectedGeneration() {

      const game =
        document.getElementById("game").value;

      if (game === "gen5") {
        return 5;
      }

      if (game === "gen6") {
        return 6;
      }
    }

    async function getPokemonData(name) {

      const response = await fetch(
        `https://pokeapi.co/api/v2/pokemon/${name.toLowerCase()}`
      );

      if (!response.ok) {
        throw new Error("Pokémon nicht gefunden");
      }

      const data = await response.json();

      return {
        name: data.name,
        image: data.sprites.front_default,
        catchRateUrl: data.species.url
      };
    }

    async function getCatchRate(url) {

      const response = await fetch(url);

      const data = await response.json();

      return data.capture_rate;
    }

    async function calculateCatchChance() {

      try {

        const pokemonName =
          document.getElementById("pokemonName").value;

        const generation =
          getSelectedGeneration();

        const pokemonData =
          await getPokemonData(pokemonName);

        const catchRate =
          await getCatchRate(
            pokemonData.catchRateUrl
          );

        const hpPercent =
          Number(
            document.getElementById("hpPercent").value
          );

        const ballBonus =
          Number(
            document.getElementById("ballBonus").value
          );

        const statusBonus =
          Number(
            document.getElementById("statusBonus").value
          );

        if (ballBonus === 255) {

          document.getElementById("result").innerHTML = `
            <h2>${pokemonData.name}</h2>

            <img src="${pokemonData.image}">

            <p>
              Generation: ${generation}
            </p>

            <p>
              Catch Rate: ${catchRate}
            </p>

            <p>
              Fangchance: 100%
            </p>
          `;

          return;
        }

        const maxHp = 100;

        const currentHp =
          Math.max(
            1,
            Math.round(maxHp * hpPercent)
          );

        const a =
          (
            (3 * maxHp - 2 * currentHp)
            * catchRate
            * ballBonus
            * statusBonus
          )
          / (3 * maxHp);

        let chance;

        if (a >= 255) {

          chance = 100;

        } else {

          const b =
            65536 /
            Math.sqrt(
              Math.sqrt(255 / a)
            );

          chance =
            Math.pow(b / 65536, 4) * 100;
        }

        document.getElementById("result").innerHTML = `
          <h2>${pokemonData.name}</h2>

          <img src="${pokemonData.image}">

          <p>
            Generation: ${generation}
          </p>

          <p>
            Catch Rate: ${catchRate}
          </p>

          <p>
            Geschätzte Fangchance:
            ${chance.toFixed(2)}%
          </p>
        `;

      } catch (error) {

        document.getElementById("result").innerText =
          "Pokémon nicht gefunden.";
      }
    }

  </script>
</div>
	
</body>
	
</html>
